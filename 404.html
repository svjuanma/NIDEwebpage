<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error 404 - No encontrado</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    .page-wrapper {
      position: relative; 
      width: 100%;
      height: 100%;
      overflow: hidden; 
    }

    .image-nide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1; 
      background-color: #f0f0f0; 
    }

    .image-nide img {
      width: 100%;
      height: 100%;
      object-fit: cover; 
    }

    .overlay {
      position: absolute; 
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(3px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2; 
      padding: 20px; 
      box-sizing: border-box;
    }

    .text-container {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      max-width: 70vw;
      align-items: center;
      color: #f0f0f0;
      text-align: center;
    }

    .text-container h1 {
      font-size: clamp(7rem, 40vw, 15rem);
      margin: 0; 
    }

    .text-container h2 {
      font-size: clamp(0.5rem, 10vw, 3rem);
      margin: 0;
      font-weight: normal;
    }
  </style>
</head>
<body>

  <div class="page-wrapper">
    <section class="image-nide">
      <img src="./src/assets/LOGO-NIDE.png" alt="NIDE" />
    </section>
    
    <section class="overlay">
      <div class="text-container">
        <h1>404</h1>
        <h2>Lo sentimos, no hemos encontrado lo que buscas</h2>
      </div>
    </section>
  </div>

</body>
</html>
